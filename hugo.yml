baseURL: https://www.hasna.ro/
title: Octavian Hasna
theme: hugo-PaperMod

pagination:
  pagerSize: 5

enableRobotsTXT: true
enableGitInfo: true
enableInlineShortcodes: true

services:
  googleAnalytics:
    id: G-0YE02LQLLW
  disqus:
    shortname: octavian1001

taxonomies:
  category: categories
  tag: tags

defaultContentLanguage: en
languages:
  en:
    languageName: English
    contentDir: content/en
    weight: 1
    params:
      label:
        text: Home
      footer:
        text: "[Privacy policy](/privacy-policy/)"
    menu:
      main:
        - name: Projects
          url: /projects/
          weight: 1
        - name: Research
          url: /research/
          weight: 2
        - name: Publications
          url: /publications/
          weight: 3

  ro:
    languageName: Română
    contentDir: content/ro
    weight: 2
    params:
      label:
        text: Acasa
    menu:
      main:
        - name: Trasee
          url: /routes/
          weight: 1
        - name: Blog
          url: /posts/
          weight: 2

minify:
  minifyOutput: true

params:
  env: production
  author: Octavian Hasna
  description: Presentation website with personal projects, research interests, publications etc.
  keywords: [ hiking, research, publications, projects]

  defaultTheme: auto
  disableThemeToggle: false
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: false
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true

  assets:
    favicon: /favicon.ico

  profileMode:
    enabled: true
    imageUrl: /apple-touch-icon.png
    imageTitle: site logo

  socialIcons:
    - name: github
      url: https://github.com/octavian-h
    - name: linkedin
      url: https://ro.linkedin.com/in/octavian-lucian-hasna-9aaa85105
    - name: stackoverflow
      url: https://stackoverflow.com/users/2607910/octavian1001

privacy:
  disqus:
    disable: true
  googleAnalytics:
    anonymizeIP: false
    disable: false
    respectDoNotTrack: true
    useSessionStorage: false
  instagram:
    disable: true
  x:
    disable: true
  vimeo:
    disable: true
  youtube:
    disable: false
    privacyEnhanced: true
